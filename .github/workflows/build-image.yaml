# Build + push the agent-base harness image to ghcr on every master push. Single responsibility:
# this repo produces one artifact family, so there are no path filters or "is this a deploy?" rules
# — every push to master builds. The tag is content-addressed by agent-base/devbox.lock (same lock →
# same toolchain → same tag), so a rebuild is reproducible and Renovate's lock bump is the trigger.
#
# amd64-only (the agents run in-cluster on x86). Self-hosted ARC runner (homelab-ephemeral); ghcr
# push auth is the job's GITHUB_TOKEN (packages: write) — no extra secret. Mirrors the sleep-tracking
# build-image.yaml so the pattern is identical across Tier-A repos.
name: build-image

on:
  push:
    branches: [master]
    paths: # only rebuild when the image content can actually change (not on doc-only commits)
      - "agent-base/**"
      - ".github/workflows/build-image.yaml"
  workflow_dispatch:

jobs:
  image:
    runs-on: homelab-ephemeral
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Version = commit-date CalVer + short git sha (2026.<m>.<d>-g<sha>) — consistent with the
      # openrouter-operator / sleep-ingester deploy versioning. Traceable (tag → commit); the path
      # filter above keeps it from churning on changes that don't affect the image.
      - name: Compute version
        id: ver
        run: |
          SHA=$(git rev-parse --short=12 HEAD)
          DATE=$(git show -s --format=%cd --date=format:'%Y.%-m.%-d' HEAD)
          echo "tag=${DATE}-g${SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: agent-base/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-base:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/agent-base:latest

  # deploy-pin: bump homelab agents/images.env to the just-built version → agent pods use the pinned
  # image (off :latest) on next spawn. First-party bump (CI-opened, not Renovate). ubuntu-latest for
  # a pre-installed gh + git; skips gracefully until DEPLOY_APP_* is wired.
  deploy-pin:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: DEPLOY_APP present?
        id: gate
        run: |
          if [ -n "${{ secrets.DEPLOY_APP_ID }}" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"; else
            echo "::warning::DEPLOY_APP_ID unset — skipping images.env bump (run 'devbox run github-tofu apply' + install homelab-deploy on homelab)"
            echo "ok=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        if: steps.gate.outputs.ok == 'true'
        id: hl
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homelab
      - name: Open/arm the homelab images.env bump PR
        if: steps.gate.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ steps.hl.outputs.token }}
          TAG: ${{ needs.image.outputs.tag }}
        run: |
          set -euo pipefail
          VAR=AGENT_BASE_IMAGE; NEWREF="ghcr.io/${{ github.repository_owner }}/agent-base:${TAG}"
          git clone --quiet --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/homelab.git" h && cd h
          cur=$(grep -m1 "^${VAR}=" agents/images.env | cut -d= -f2-)
          [ "$cur" = "$NEWREF" ] && { echo "images.env already ${VAR}=${NEWREF}"; exit 0; }
          git config user.name "homelab-deploy[bot]"; git config user.email "homelab-deploy[bot]@users.noreply.github.com"
          git checkout -q -B deploy/agent-base
          sed -i -E "s#^(${VAR}=).*#\1${NEWREF}#" agents/images.env
          git commit -q -am "deploy: agent-base ${TAG}"
          git push -q -f origin deploy/agent-base
          PR=$(gh pr list --repo "${{ github.repository_owner }}/homelab" --head deploy/agent-base --state open --json number --jq '.[0].number // empty')
          [ -n "$PR" ] || PR=$(gh pr create --repo "${{ github.repository_owner }}/homelab" --base master --head deploy/agent-base \
            --title "deploy: agent-base ${TAG}" --body "First-party agent-base image bump (CI-opened, not Renovate). Agent worker pods pick it up on next spawn." | grep -oE '[0-9]+$')
          gh pr merge "$PR" --repo "${{ github.repository_owner }}/homelab" --auto --squash || echo "::warning::could not arm auto-merge on homelab#$PR"
          echo "→ homelab images.env PR #$PR → ${TAG}"
